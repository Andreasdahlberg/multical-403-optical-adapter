name: "Release"

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set version in KiCad project
        run: |
          jq '.text_variables.VERSION = "${{ github.ref_name }}"' \
            pcb/optical_adapter.kicad_pro > tmp.kicad_pro \
            && mv tmp.kicad_pro pcb/optical_adapter.kicad_pro

      - name: Package KiCad project files
        run: |
          zip -r ${{github.event.repository.name}}-kicad-${{github.ref_name}}.zip pcb/ \
            --exclude 'pcb/*-backups/*' \
            --exclude 'pcb/*.lck' \
            --exclude 'pcb/fp-info-cache'

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ${{github.event.repository.name}}-kicad-${{github.ref_name}}.zip
